<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<!-- Security headers (meta-tag fallback). For maximum protection, set these
     as HTTP response headers on the server too — see .htaccess and _headers. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com; form-action 'self' https://api.web3forms.com; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Deliverable — Sthiti Limited</title>
<meta name="description" content="A service deliverable from Sthiti Limited.">
<link rel="icon" type="image/jpeg" href="sthiti-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Inter:wght@300;400;500;700&family=Noto+Serif+Bengali:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sthiti.css">
<style>
.dvb-hero{padding:160px 56px 80px;background:var(--paper);border-bottom:1px solid var(--rule);}
.dvb-crumb{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--olive);margin-bottom:24px;}
.dvb-crumb a{color:var(--olive);border-bottom:1px solid transparent;transition:.2s;}
.dvb-crumb a:hover{color:var(--terracotta);border-bottom-color:var(--terracotta);}
.dvb-discipline{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--terracotta);margin-bottom:14px;}
.dvb-hero h1{font-size:clamp(2rem,4.2vw,3.4rem);max-width:880px;font-weight:300;color:var(--charcoal);margin-bottom:24px;}

.dvb-body{padding:72px 56px 56px;max-width:840px;margin:0 auto;}
.dvb-body p{font-size:1.12rem;line-height:1.95;color:var(--taupe);margin-bottom:24px;}
.dvb-body .lead{font-size:1.25rem;color:var(--charcoal);font-family:'Playfair Display',serif;font-style:italic;font-weight:300;border-left:3px solid var(--terracotta);padding-left:24px;margin-bottom:36px;}

.dvb-footer{padding:48px 56px;max-width:840px;margin:0 auto;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;}
.dvb-footer a{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--charcoal);font-weight:500;padding:6px 0;border-bottom:1px solid var(--charcoal);transition:.2s;}
.dvb-footer a:hover{color:var(--terracotta);border-bottom-color:var(--terracotta);}

.dvb-cta-band{background:var(--forest);color:var(--cream);padding:72px 56px;text-align:center;}
.dvb-cta-band h2{color:var(--cream);font-size:clamp(1.5rem,3vw,2rem);font-weight:300;margin-bottom:18px;}
.dvb-cta-band h2 em{color:var(--clay);font-style:italic;}
.dvb-cta-band p{color:rgba(244,239,230,.78);max-width:560px;margin:0 auto 28px;}

.notfound{padding:200px 56px;text-align:center;}
@media(max-width:900px){
  .dvb-hero{padding:120px 24px 56px;}
  .dvb-body{padding:48px 24px;}
  .dvb-footer{padding:36px 24px;}
}
</style>
</head>
<body>
<nav id="nav">
  <a href="index.html" class="nav-logo"><img src="sthiti-logo.jpg" alt="Sthiti Limited"><span class="nav-logo-text">Sthiti Limited</span></a>
  <ul class="nav-links">
    <li><a href="work.html">Work</a></li><li><a href="studio.html">Studio</a></li>
    <li><a href="services.html">Service</a></li><li><a href="journal.html">Journal</a></li>
    <li><a href="newsletter.html">Newsletter</a></li><li><a href="mail.html">Email</a></li>
    <li><a href="contact.html" class="nav-cta">Enquire</a></li>
  </ul>
  <button class="nav-hamburger" onclick="toggleMobileNav()" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-nav" id="mobileNav">
  <a href="work.html">Work</a><a href="studio.html">Studio</a><a href="services.html">Service</a>
  <a href="journal.html">Journal</a><a href="newsletter.html">Newsletter</a><a href="mail.html">Email</a><a href="contact.html">Contact</a>
</div>

<main id="dvbMain"></main>

<footer id="siteFooter"></footer>
<button class="admin-fab" id="adminFab" onclick="openAdmin()" title="Admin (Ctrl+Shift+A)">⚙</button>

<script src="data.js"></script>
<script src="common.js"></script>
<script src="admin.js"></script>
<script>
(function(){
  'use strict';
  function getParam(name){
    var m = window.location.search.match(new RegExp('[?&]'+ name +'=([^&]+)'));
    return m ? decodeURIComponent(m[1]) : '';
  }
  var dKey = getParam('d');
  var iId  = getParam('i');
  var disc = window.findDiscipline(dKey);
  var item = window.findDeliverable(dKey, iId);
  var main = document.getElementById('dvbMain');

  if(!disc || !item){
    main.innerHTML =
      '<div class="notfound"><h1>Service not <em>found.</em></h1>'+
      '<p>The requested service deliverable could not be located.</p>'+
      '<p style="margin-top:28px;"><a href="services.html" class="btn">\u2190 Back to Services</a></p></div>';
    return;
  }

  document.title = item.title + ' \u2014 ' + disc.title + ' \u2014 Sthiti Limited';

  var html = '';
  html += '<section class="dvb-hero">';
  html += '<div class="dvb-crumb"><a href="services.html">\u2190 Services</a> &nbsp;\u00b7&nbsp; <a href="services.html#'+ window.escAttr(disc.key) +'">'+ window.esc(disc.title) +'</a></div>';
  html += '<div class="dvb-discipline">'+ window.esc(disc.roman) +'. '+ window.esc(disc.title) +'</div>';
  html += '<h1>'+ window.esc(item.title) +'</h1>';
  html += '<div class="proj-share">' + window.buildShareBar({title: item.title + ' \u2014 ' + disc.title + ' \u2014 Sthiti Limited'}) + '</div>';
  html += '</section>';
  html += '<div class="dvb-body">';
  html += '<p class="lead">\u201c'+ window.esc(disc.tagline) +'\u201d</p>';
  html += '<p>'+ window.esc(item.brief) +'</p>';
  html += '</div>';
  html += '<div class="dvb-footer">';
  html += '<a href="services.html#'+ window.escAttr(disc.key) +'">\u2190 All '+ window.esc(disc.title) +' deliverables</a>';
  html += '<a href="contact.html">Enquire about this service \u2192</a>';
  html += '</div>';
  html += '<section class="dvb-cta-band">';
  html += '<h2>Have a brief that needs <em>'+ window.esc(item.title.toLowerCase()) +'</em>?</h2>';
  html += '<p>Send a note to the studio describing the site, the programme and the timeline.</p>';
  html += '<a href="contact.html" class="btn" style="border-color:var(--clay);color:var(--clay);">Send an Enquiry</a>';
  html += '</section>';
  main.innerHTML = html;
})();
</script>
</body>
</html>
