<script>
(function(){
  'use strict';
  var SLIDE_MS = 8000;
  var cur = 0;
  var slides = document.querySelectorAll('.slide');
  var dotEls = document.querySelectorAll('.dots button');
  var total = slides.length;

  var CAPTIONS = [
    {cat:'Civic & Cultural · 2017',     t:'Police Liberation War \u2014 The Red <em>Path.</em>', m:'Rajarbag, Dhaka'},
    {cat:'Interior · 2024',             t:'Doyal Residence \u2014 Terracotta <em>Living.</em>',  m:'Tikatuli, Dhaka'},
    {cat:'Interior · 2025',             t:'Sobuj Residence \u2014 Living <em>Room.</em>',        m:'Mirpur 10, Dhaka'},
    {cat:'Residential · 2023\u20132024',t:'Narail Vacation <em>House.</em>',                     m:'Lohagora, Narail'},
    {cat:'Healthcare · 2024\u2013Present',t:'Daudpur General <em>Hospital.</em>',                m:'Rupgonj, Narayanganj'},
    {cat:'Masterplan · 2019',           t:'Netrokona University <em>Campus.</em>',               m:'Netrokona, Bangladesh'},
    {cat:'Residential · 2025',          t:'Shefali Residence \u2014 Front <em>Elevation.</em>',  m:'Sherpur, Bangladesh'},
    {cat:'Civic & Cultural · 2017',     t:'Police Liberation War \u2014 The Black <em>Box.</em>',m:'Rajarbag, Dhaka'}
  ];

  function updateCap(i){
    var c = CAPTIONS[i] || {cat:'Selected Work',t:'',m:''};
    document.getElementById('capCat').textContent = c.cat;
    document.getElementById('capT').innerHTML = c.t;
    document.getElementById('capMeta').textContent = c.m;
    document.getElementById('ctNum').textContent = String(i+1).padStart(2,'0');
  }
  function go(i){
    slides[cur].classList.remove('active');
    dotEls[cur].classList.remove('active');
    cur = (i + total) % total;
    slides[cur].classList.add('active');
    dotEls[cur].classList.add('active');
    updateCap(cur);
    resetProg();
  }
  function next(){ go(cur + 1); }
  function prev(){ go(cur - 1); }

  var progStart = Date.now(), rafId = 0;
  function tick(){
    var e = Date.now() - progStart;
    document.getElementById('progFill').style.width = Math.min(100, (e/SLIDE_MS)*100) + '%';
    if(e >= SLIDE_MS){ next(); return; }
    rafId = requestAnimationFrame(tick);
  }
  function resetProg(){ progStart = Date.now(); cancelAnimationFrame(rafId); rafId = requestAnimationFrame(tick); }

  dotEls.forEach(function(b){ b.addEventListener('click', function(){ go(parseInt(b.dataset.i, 10)); }); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight') next();
    else if(e.key === 'ArrowLeft') prev();
  });
  var touchX = 0;
  document.addEventListener('touchstart', function(e){ touchX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchX;
    if(Math.abs(dx) > 50) (dx > 0 ? prev() : next());
  }, {passive:true});

  updateCap(0);
  resetProg();

  /* Belt-and-braces: ensure the intro splash actually hides even if CSS animation is blocked */
  var intro = document.getElementById('intro');
  if(intro){
    setTimeout(function(){
      intro.style.opacity = '0';
      intro.style.visibility = 'hidden';
      intro.style.pointerEvents = 'none';
    }, 2600);
    /* And a hard removal at 4s so it never lingers under any condition */
    setTimeout(function(){ if(intro.parentNode) intro.parentNode.removeChild(intro); }, 4000);
    /* Dismiss on user interaction */
    intro.addEventListener('click', function(){ intro.style.display='none'; });
  }
})();
</script>
