<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<!-- Security headers (meta-tag fallback). For maximum protection, set these
     as HTTP response headers on the server too — see .htaccess and _headers. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com; form-action 'self' https://api.web3forms.com; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Project — Sthiti Limited</title>
<meta name="description" content="Project case study by Sthiti Limited.">
<link rel="icon" type="image/jpeg" href="sthiti-logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Inter:wght@300;400;500;700&family=Noto+Serif+Bengali:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sthiti.css">
<style>
.proj-hero{padding:160px 56px 60px;background:var(--paper);border-bottom:1px solid var(--rule);}
.proj-hero .crumb{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--olive);margin-bottom:22px;}
.proj-hero .crumb a{color:var(--olive);border-bottom:1px solid transparent;transition:.2s;}
.proj-hero .crumb a:hover{color:var(--terracotta);border-bottom-color:var(--terracotta);}
.proj-hero h1{font-size:clamp(2.2rem,4.6vw,4rem);max-width:1000px;margin-bottom:24px;}
.proj-hero h1 em{font-style:italic;color:var(--terracotta);}
.proj-hero .meta{display:flex;flex-wrap:wrap;gap:32px;margin-top:18px;font-size:.8rem;color:var(--taupe);letter-spacing:.06em;}
.proj-hero .meta strong{color:var(--charcoal);text-transform:uppercase;letter-spacing:.18em;font-size:.68rem;display:block;margin-bottom:6px;font-weight:500;}
.proj-share{margin-top:32px;}

.proj-brief{padding:72px 56px;max-width:920px;margin:0 auto;font-size:1.08rem;line-height:1.95;color:var(--taupe);}
.proj-gallery{padding:0 56px 60px;max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:24px;}
.proj-photo{position:relative;overflow:hidden;border-radius:3px;background:var(--sand);}
.proj-photo img{width:100%;height:auto;display:block;}
.proj-photo .caption{padding:18px 24px;background:var(--paper);border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px;}
.proj-photo .caption .pname{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--charcoal);}
.proj-photo .caption .plabel{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--olive);}

.proj-footer{padding:56px;max-width:1400px;margin:0 auto;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;}
.proj-footer a{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--charcoal);font-weight:500;padding:6px 0;border-bottom:1px solid var(--charcoal);transition:.2s;}
.proj-footer a:hover{color:var(--terracotta);border-bottom-color:var(--terracotta);}

.notfound{padding:200px 56px;text-align:center;}
.notfound h1{font-size:2.2rem;margin-bottom:18px;}
@media(max-width:900px){
  .proj-hero{padding:120px 24px 48px;}
  .proj-brief{padding:48px 24px;font-size:1rem;}
  .proj-gallery{padding:0 24px 48px;}
  .proj-footer{padding:36px 24px;}
}
</style>
</head>
<body>
<nav id="nav">
  <a href="index.html" class="nav-logo"><img src="sthiti-logo.jpg" alt="Sthiti Limited"><span class="nav-logo-text">Sthiti Limited</span></a>
  <ul class="nav-links">
    <li><a href="work.html">Work</a></li><li><a href="studio.html">Studio</a></li>
    <li><a href="services.html">Service</a></li><li><a href="journal.html">Journal</a></li>
    <li><a href="newsletter.html">Newsletter</a></li><li><a href="mail.html">Email</a></li>
    <li><a href="contact.html" class="nav-cta">Enquire</a></li>
  </ul>
  <button class="nav-hamburger" onclick="toggleMobileNav()" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-nav" id="mobileNav">
  <a href="work.html">Work</a><a href="studio.html">Studio</a><a href="services.html">Service</a>
  <a href="journal.html">Journal</a><a href="newsletter.html">Newsletter</a><a href="mail.html">Email</a><a href="contact.html">Contact</a>
</div>

<main id="projMain"></main>

<footer id="siteFooter"></footer>
<button class="admin-fab" id="adminFab" onclick="openAdmin()" title="Admin (Ctrl+Shift+A)">⚙</button>

<script src="data.js"></script>
<script src="common.js"></script>
<script src="admin.js"></script>
<script>
(function(){
  'use strict';
  function getParam(name){
    var match = window.location.search.match(new RegExp('[?&]'+ name +'=([^&]+)'));
    return match ? decodeURIComponent(match[1]) : '';
  }
  var pid = getParam('p');
  var project = window.findProject(pid);
  var main = document.getElementById('projMain');

  if(!project){
    main.innerHTML =
      '<div class="notfound"><h1>Project not <em>found.</em></h1>'+
      '<p>The requested project could not be located.</p>'+
      '<p style="margin-top:28px;"><a href="work.html" class="btn">\u2190 Back to work</a></p></div>';
    return;
  }

  var catLabel = window.CATEGORY_LABELS[project.category] || project.category;
  var titleParts = String(project.title).split(' ');
  var lastWord = titleParts.length > 1 ? titleParts.pop() : '';
  var titleHtml = window.esc(titleParts.join(' ')) + (lastWord ? ' <em>'+ window.esc(lastWord) +'</em>' : '');

  var html = '';
  html += '<section class="proj-hero">';
  html += '<div class="crumb"><a href="work.html">\u2190 All Work</a> &nbsp;\u00b7&nbsp; '+ window.esc(catLabel) +'</div>';
  html += '<h1>'+ titleHtml +'</h1>';
  html += '<div class="meta">';
  html += '<div><strong>Location</strong>'+ window.esc(project.location) +'</div>';
  html += '<div><strong>Category</strong>'+ window.esc(catLabel) +'</div>';
  html += '<div><strong>Year</strong>'+ window.esc(project.year) +'</div>';
  html += '<div><strong>Photographs</strong>'+ ((project.photos || []).length) +'</div>';
  html += '</div>';
  html += '<div class="proj-share">' + window.buildShareBar({title: project.title + ' \u2014 Sthiti Limited'}) + '</div>';
  html += '</section>';
  html += '<div class="proj-brief">'+ window.esc(project.brief) +'</div>';
  html += '<div class="proj-gallery">';
  (project.photos || []).forEach(function(photo){
    html += '<div class="proj-photo">';
    html += '<img src="'+ window.escAttr(window.imgSrc(photo.src)) +'" alt="'+ window.escAttr(project.title + ' \u2014 ' + photo.label) +'" loading="lazy">';
    html += '<div class="caption">';
    html += '<div class="pname">'+ window.esc(project.title) +'</div>';
    html += '<div class="plabel">'+ window.esc(photo.label) +'</div>';
    html += '</div></div>';
  });
  html += '</div>';
  html += '<div class="proj-footer">';
  html += '<a href="work.html">\u2190 All Work</a>';
  html += '<a href="contact.html">Enquire about this project \u2192</a>';
  html += '</div>';
  main.innerHTML = html;

  document.title = project.title + ' \u2014 Sthiti Limited';
})();
</script>
</body>
</html>
